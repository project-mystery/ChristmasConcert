<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #050508; /* 深い闇の黒 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .nazotoki-img {
            /* 👇 横の黒い線を消し、画面の横幅にぴったり合わせる設定 */
            width: 100vw;
            max-height: 95vh;
            height: auto;
            object-fit: contain;
            
            /* 👇 アニメーション：2.5秒かけて粉から画像を形成する */
            animation: snowForming 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
        }

        /* 👇 粉（砂嵐と縦のブレ）から雪のように積もって完成する動きの指示 */
        @keyframes snowForming {
            0% {
                opacity: 0;
                transform: translateY(-50px) scale(0.95); /* 上から雪のように降ってくる開始位置 */
                filter: blur(15px) contrast(300%) brightness(3); /* 画像を粉々（砂嵐の粒子）にする効果 */
            }
            15% {
                opacity: 0.4;
                transform: translateY(-30px) scale(0.97);
                filter: blur(10px) contrast(250%) brightness(2.5);
            }
            45% {
                opacity: 0.8;
                transform: translateY(-10px) scale(0.99); /* 徐々に下に積もっていく */
                filter: blur(4px) contrast(180%) brightness(1.5);  /* だんだん粉がまとまってくる */
            }
            75% {
                opacity: 0.95;
                transform: translateY(-2px) scale(1);
                filter: blur(1px) contrast(120%) brightness(1.1);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1); /* ぴったり元の位置に積もって静止 */
                filter: blur(0) contrast(100%) brightness(1); /* クッキリ綺麗な画像に形成 */
            }
        }
    </style>
</head>
<body>
    <!-- 👇 ここにあなたの画像ファイルを指定してください -->
    <img src="ChristmasConcert.PNG" alt="謎解きの指示" class="nazotoki-img">
</body>
</html>
