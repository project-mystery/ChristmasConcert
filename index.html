<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警告</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #050508; /* より深い闇の黒 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .nazotoki-img {
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.2); /* 怪しいサイバーグリーンの光 */
            
            /* 👇 1.2秒間でノイズ点滅を実行する設定 */
            animation: cyberNoise 1.2s linear forwards;
            opacity: 0;
        }

        /* 👇 サイバーノイズ・点滅の動きの指示 */
        @keyframes cyberNoise {
            0%   { opacity: 0; transform: scale(0.95) skewX(0deg); filter: brightness(1); }
            10%  { opacity: 1; transform: scale(1) skewX(5deg); filter: brightness(2); }  /* 点滅1回目＋横ブレ */
            15%  { opacity: 0; transform: scale(0.98) skewX(-5deg); }
            30%  { opacity: 0; }
            35%  { opacity: 1; transform: scale(1) skewX(0deg); filter: brightness(1.5); } /* 点滅2回目 */
            40%  { opacity: 0; }
            55%  { opacity: 0; }
            60%  { opacity: 1; filter: brightness(2); }                                    /* 点滅3回目 */
            65%  { opacity: 0; }
            80%  { opacity: 0; }
            85%  { opacity: 1; transform: scale(1.02) skewX(3deg); filter: hue-rotate(90deg); } /* 最後の激しいブレ */
            100% { opacity: 1; transform: scale(1) skewX(0deg); filter: brightness(1) hue-rotate(0deg); } /* 正常に表示 */
        }
    </style>
</head>
<body>
    <!-- テスト用に怪しい緑ベースのダミー画像URLにしています -->
    <img src="ChristmasConcert.PNG" alt="謎解きの指示" class="nazotoki-img">
</body>
</html>
