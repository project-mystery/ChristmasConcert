<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖なる指示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #050510; /* クリスマスの聖夜をイメージした深いミッドナイトブルー */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* 画像を表示するエリア（下から魔法がせり上がる土台） */
        .img-container {
            width: 100vw;
            max-height: 95vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            
            /* 3.5秒かけて下からじわじわと魔法で出現させる */
            animation: magicRise 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .nazotoki-img {
            width: 100vw;
            height: auto;
            object-fit: contain;
            
            /* 画像自体に光の魔法をかけるアニメーション */
            animation: magicLight 3.5s ease-out forwards;
        }

        /* 🪄 【新演出】下から魔法が積もるように出現する指示 */
        @keyframes magicRise {
            0% {
                clip-path: inset(100% 0 0 0); /* 最初は完全に隠れている */
            }
            40% {
                clip-path: inset(60% 0 0 0);  /* じわじわ下から金色に光りながら現れる */
            }
            75% {
                clip-path: inset(15% 0 0 0);  /* 魔法が上まで満ちていく */
            }
            100% {
                clip-path: inset(0 0 0 0);    /* 3.5秒で完全に完成 */
            }
        }

        /* ✨ ゴールドときらめきの魔法エフェクトの指示 */
        @keyframes magicLight {
            0% {
                opacity: 0;
                /* 最初は黄金の光のモヤ（セピア＋高輝度）がかかり、星のきらめきでぼやけている状態 */
                filter: blur(25px) sepia(100%) saturate(500%) brightness(2) drop-shadow(0 0 30px #ffd700);
                transform: scale(0.95);
            }
            20% {
                opacity: 0.5;
                /* チカチカと魔法の星が瞬くような輝きの変化 */
                filter: blur(18px) sepia(80%) saturate(400%) brightness(3) drop-shadow(0 0 40px #fff);
            }
            50% {
                opacity: 0.8;
                filter: blur(10px) sepia(40%) saturate(200%) brightness(1.8) drop-shadow(0 0 30px #ffd700);
                transform: scale(0.98);
            }
            80% {
                opacity: 0.95;
                /* 魔法の光がすーっと晴れていく瞬間 */
                filter: blur(3px) sepia(10%) saturate(120%) brightness(1.2) drop-shadow(0 0 15px #ffd700);
            }
            100% {
                opacity: 1;
                /* 完全にクリアで綺麗な画像に着地 */
                filter: blur(0) sepia(0%) saturate(100%) brightness(1) drop-shadow(0 0 0px transparent);
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="img-container">
        <!-- 👇 ここにあなたの画像ファイルを指定してください -->
        <img src="ChristmasConcert.PNG" alt="謎解きの指示" class="nazotoki-img">
    </div>

</body>
</html>
