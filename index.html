<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #050508; /* 深い闇の黒 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* 画像を表示するエリアの土台（ここで下から上への出現をコントロールします） */
        .img-container {
            width: 100vw;
            max-height: 95vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            
            /* 👇 3秒間かけて、下から上に向かって画像を切り抜く（積もるような出現） */
            animation: snowRise 3.0s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .nazotoki-img {
            width: 100vw;
            height: auto;
            object-fit: contain;
            
            /* 👇 出現する瞬間にザラザラした砂嵐（ノイズ）のような加工をかける */
            animation: noiseFilter 3.0s ease-out forwards;
        }

        /* 🛠️ 【新演出】下からせり上がるように出現させる指示 */
        @keyframes snowRise {
            0% {
                clip-path: inset(100% 0 0 0); /* 最初は画像の下100%が隠れている状態 */
            }
            30% {
                clip-path: inset(80% 0 0 0);  /* 0.9秒：下から20%だけうっすら現れる（積もり始め） */
            }
            60% {
                clip-path: inset(40% 0 0 0);  /* 1.8秒：下から60%まで現れる */
            }
            85% {
                clip-path: inset(10% 0 0 0);  /* 2.5秒：ほぼ上まで現れる */
            }
            100% {
                clip-path: inset(0 0 0 0);    /* 3.0秒：100%すべてが出現して完成 */
            }
        }

        /* 🛠️ 出現するときのザラザラした霧・砂嵐を表現する指示 */
        @keyframes noiseFilter {
            0% {
                opacity: 0;
                filter: blur(15px) contrast(300%) brightness(2.5); /* 強いザラザラ霧 */
                transform: scale(0.97);
            }
            50% {
                opacity: 0.7;
                filter: blur(8px) contrast(200%) brightness(1.5);  /* 中くらいのザラザラ */
            }
            85% {
                opacity: 0.95;
                filter: blur(2px) contrast(120%) brightness(1.1);  /* ほぼクリア */
            }
            100% {
                opacity: 1;
                filter: blur(0) contrast(100%) brightness(1);     /* 完全にクッキリ */
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- 構造が変わったため、画像を1つの「枠（container）」で囲んでいます -->
    <div class="img-container">
        <!-- 👇 ここにあなたの画像ファイルを指定してください -->
        <img src="ChristmasConcert.PNG" alt="謎解きの指示" class="nazotoki-img">
    </div>

</body>
</html>
