<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖なる指示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #050512; /* 聖夜のディープブルー */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* 星のスタイル（あなたのコードをベースに調整） */
        .star {
            position: absolute;
            display: block;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 4s infinite ease-in-out;
        }

        /* 星がキラキラ光るアニメーション */
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.4); }
            50% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 15px #ffd700); }
            100% { opacity: 0; transform: scale(0.4); }
        }

        /* 画像を表示するエリア */
        .img-container {
            width: 100vw;
            max-height: 95vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            z-index: 10; /* 星よりも手前に画像を表示 */
            animation: magicRise 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .nazotoki-img {
            width: 100vw;
            height: auto;
            object-fit: contain;
            animation: imgFade 3.5s ease-out forwards;
        }

        @keyframes magicRise {
            0% { clip-path: inset(100% 0 0 0); }
            100% { clip-path: inset(0 0 0 0); }
        }

        @keyframes imgFade {
            0% { opacity: 0; filter: blur(15px) brightness(1.5); }
            100% { opacity: 1; filter: blur(0) brightness(1); }
        }
    </style>
</head>
<body>

    <!-- 🌌 ここから満天の星空（25個の大増量！） 🌌 -->

    <div class="star" style="top: 8%; left: 45%; width: 3px; height: 3px; animation-delay: 1.5s;"></div>
    <div class="star" style="top: 12%; left: 75%; width: 5px; height: 5px; animation-delay: 0.8s;"></div>
    <div class="star" style="top: 18%; left: 30%; width: 2px; height: 2px; animation-delay: 2.2s;"></div>
    <div class="star" style="top: 22%; left: 90%; width: 6px; height: 6px; animation-delay: 3.1s;"></div>
    
    <div class="star" style="top: 28%; left: 10%; width: 4px; height: 4px; animation-delay: 0.5s;"></div>
    <div class="star" style="top: 32%; left: 60%; width: 5px; height: 5px; animation-delay: 1.8s;"></div>
    <div class="star" style="top: 38%; left: 40%; width: 3px; height: 3px; animation-delay: 2.7s;"></div>
    <div class="star" style="top: 42%; left: 80%; width: 4px; height: 4px; animation-delay: 0.2s;"></div>
    <div class="star" style="top: 48%; left: 20%; width: 6px; height: 6px; animation-delay: 1.1s;"></div>
    
    <div class="star" style="top: 52%; left: 70%; width: 3px; height: 3px; animation-delay: 3.5s;"></div>
    <div class="star" style="top: 56%; left: 95%; width: 4px; height: 4px; animation-delay: 0.9s;"></div>
    <div class="star" style="top: 62%; left: 15%; width: 5px; height: 5px; animation-delay: 2.0s;"></div>
    <div class="star" style="top: 66%; left: 50%; width: 2px; height: 2px; animation-delay: 1.3s;"></div>
    <div class="star" style="top: 72%; left: 85%; width: 4px; height: 4px; animation-delay: 2.8s;"></div>
    
    <div class="star" style="top: 76%; left: 35%; width: 6px; height: 6px; animation-delay: 0.4s;"></div>
    <div class="star" style="top: 82%; left: 65%; width: 3px; height: 3px; animation-delay: 1.7s;"></div>
    <div class="star" style="top: 85%; left: 10%; width: 4px; height: 4px; animation-delay: 2.4s;"></div>
    <div class="star" style="top: 89%; left: 55%; width: 5px; height: 5px; animation-delay: 3.3s;"></div>
    <div class="star" style="top: 94%; left: 80%; width: 3px; height: 3px; animation-delay: 0.7s;"></div>
    
    <div class="star" style="top: 15%; left: 55%; width: 4px; height: 4px; animation-delay: 2.5s;"></div>
    <div class="star" style="top: 35%; left: 25%; width: 3px; height: 3px; animation-delay: 0.6s;"></div>
    <div class="star" style="top: 58%; left: 38%; width: 5px; height: 5px; animation-delay: 1.9s;"></div>
    <div class="star" style="top: 70%; left: 3%; width: 4px; height: 4px; animation-delay: 3.0s;"></div>
    <div class="star" style="top: 91%; left: 28%; width: 6px; height: 6px; animation-delay: 1.2s;"></div>

    <!-- 画像のエリア -->
    <div class="img-container">
        <!-- 👇 ここにあなたの画像ファイルを指定してください -->
        <img src="ChristmasConcert.PNG" alt="謎解きの指示" class="nazotoki-img">
    </div>

</body>
</html>
