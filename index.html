<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖なる指示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #050512; /* 聖夜のディープブルー */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* 👇 あなたが持ってきてくれた星のスタイルをベースに設定 */
        .star {
            position: absolute;
            display: block;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 4s infinite ease-in-out;
        }

        /* 👇 星がキラキラ光るアニメーション（そのまま採用！） */
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 6px #fff); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* 画像を表示するエリア（下からじわじわ現れる） */
        .img-container {
            width: 100vw;
            max-height: 95vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            z-index: 10; /* 星よりも手前に画像を表示します */
            animation: magicRise 3.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .nazotoki-img {
            width: 100vw;
            height: auto;
            object-fit: contain;
            animation: imgFade 3.5s ease-out forwards;
        }

        @keyframes magicRise {
            0% { clip-path: inset(100% 0 0 0); }
            100% { clip-path: inset(0 0 0 0); }
        }

        @keyframes imgFade {
            0% { opacity: 0; filter: blur(15px) brightness(1.5); }
            100% { opacity: 1; filter: blur(0) brightness(1); }
        }
    </style>
</head>
<body>

    <!-- 👇 画面全体にきらきら瞬く星をたくさん配置しました！位置やサイズをバラバラにしています -->
    <div class="star" style="top: 15%; left: 10%; width: 4px; height: 4px; animation-delay: 0s;"></div>
    <div class="star" style="top: 25%; left: 80%; width: 6px; height: 6px; animation-delay: 1s;"></div>
    <div class="star" style="top: 40%; left: 25%; width: 3px; height: 3px; animation-delay: 2s;"></div>
    <div class="star" style="top: 65%; left: 85%; width: 5px; height: 5px; animation-delay: 0.5s;"></div>
    <div class="star" style="top: 80%; left: 15%; width: 4px; height: 4px; animation-delay: 1.5s;"></div>
    <div class="star" style="top: 50%; left: 50%; width: 7px; height: 7px; animation-delay: 2.5s;"></div>
    <div class="star" style="top: 10%; left: 60%; width: 3px; height: 3px; animation-delay: 3s;"></div>
    <div class="star" style="top: 75%; left: 70%; width: 5px; height: 5px; animation-delay: 1.2s;"></div>

    <!-- 画像のエリア -->
    <div class="img-container">
        <!-- 👇 ここにあなたの画像ファイルを指定してください -->
        <img src="ChristmasConcert.PNG" alt="謎解きの指示" class="nazotoki-img">
    </div>

</body>
</html>
