<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #050508; /* 深い闇の黒 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .nazotoki-img {
            /* 横幅を画面サイズぴったりにする設定 */
            width: 100vw;
            max-height: 95vh;
            height: auto;
            object-fit: contain;
            
            /* 👇 時間を「3.0s（3秒）」に変更し、よりゆっくり滑らかに積もるように設定 */
            animation: snowForming 3.0s cubic-bezier(0.3, 0.1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* 👇 3秒間の時間の使い方を細かく調整（半分以上の時間をかけて粉を維持します） */
        @keyframes snowForming {
            0% {
                opacity: 0;
                transform: translateY(-60px) scale(0.93); /* 最初は少し高い位置から */
                filter: blur(20px) contrast(350%) brightness(3); /* 完全にバラバラの粉状態 */
            }
            30% {
                opacity: 0.3;
                transform: translateY(-40px) scale(0.95);
                filter: blur(15px) contrast(300%) brightness(2.5); /* まだまだ激しい砂嵐状態 */
            }
            60% {
                opacity: 0.6;
                transform: translateY(-20px) scale(0.97); /* 1.8秒地点でようやく半分くらい積もる */
                filter: blur(8px) contrast(200%) brightness(1.8);  /* 徐々に文字の輪郭が見え始める */
            }
            85% {
                opacity: 0.9;
                transform: translateY(-5px) scale(0.99);  /* あと一歩で完成の手前 */
                filter: blur(2px) contrast(130%) brightness(1.2);  /* ほぼ見えているけれどまだ少しモヤついている */
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1); /* 3秒ぴったりで完全に着地 */
                filter: blur(0) contrast(100%) brightness(1); /* クッキリ綺麗な画像が完成 */
            }
        }
    </style>
</head>
<body>
    <!-- 👇 ここにあなたの画像ファイルを指定してください -->
    <img src="ChristmasConcert.PNG" alt="謎解きの指示" class="nazotoki-img">
</body>
</html>
