    <title>聖なる指示</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #03030c; /* 聖夜のディープブラック */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* 星のスタイル */
        .star {
            position: absolute;
            display: block;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 4s infinite ease-in-out;
        }

        /* 星がキラキラ光るアニメーション */
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.4); }
            50% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px #ffd700); }
            100% { opacity: 0; transform: scale(0.4); }
        }

        /* 画像を表示するエリア（3秒間、完全に透明で待機する設定を追加） */
        .img-container {
            width: 100vw;
            max-height: 95vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            z-index: 10;
            
            /* 👇 3秒後にアニメーションを開始し、終わった後の形を維持(forwards)する命令 */
            animation: magicRise 3.5s cubic-bezier(0.25, 1, 0.5, 1) 3s forwards;
            opacity: 0; /* 最初は完全に透明 */
        }

        .nazotoki-img {
            width: 100vw;
            height: auto;
            object-fit: contain;
            /* 👇 画像自体も3秒後に明るくなり始める命令 */
            animation: imgFade 3.5s ease-out 3s forwards;
        }

        @keyframes magicRise {
            0% { opacity: 0; clip-path: inset(100% 0 0 0); }
            100% { opacity: 1; clip-path: inset(0 0 0 0); }
        }

        @keyframes imgFade {
            0% { filter: blur(15px) brightness(1.5); }
            100% { filter: blur(0) brightness(1); }
        }
    </style>
</head>
